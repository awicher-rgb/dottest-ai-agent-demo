name: dotTEST Autofix Workflow

on:
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  run-dottest-flow:
    name: Analyze project with dotTEST

    permissions:
      security-events: write
      actions: read
      contents: write
      pull-requests: write

    runs-on: self-hosted

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Clone dottest AI agent skills
        run: git clone https://github.com/parasoft/dottest-ai-agent-skills.git ${{ github.workspace }}/.github/skills

      - name: Setup fix branch
        shell: pwsh
        run: |
          $PR_HEAD_SHA = "${{ github.event.pull_request.head.sha }}"
          $PR_BRANCH   = "${{ github.event.pull_request.head.ref }}"
          if ([string]::IsNullOrWhiteSpace($PR_BRANCH)) {
            $FIXES_BRANCH = "dottest-ai-agent/[timestamp]"
          }
          else {
            $FIXES_BRANCH = "dottest-ai-agent/$PR_BRANCH/[timestamp]"
          }
          $FIXES_BRANCH = $FIXES_BRANCH -replace '\[timestamp\]', (Get-Date -Format 'yyyyMMddHHmmss')

          echo "Delete branch $FIXES_BRANCH"
          if (git branch --list "$FIXES_BRANCH") { git branch -D "$FIXES_BRANCH" }

          echo "Checkout branch $FIXES_BRANCH from $PR_HEAD_SHA"
          git checkout -b "$FIXES_BRANCH" "$PR_HEAD_SHA"

          echo "FIXES_BRANCH_NAME=$FIXES_BRANCH" >> $env:GITHUB_ENV

      - name: Build project (optional)
        run: dotnet build

      - name: Run dotTEST AI Agent Autofix
        id: run-dottest-ai-agent-autofix
        env:
          WORKFLOWS_DIR: ${{ github.workspace }}/.github/workflows
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: pwsh
        run: |
          $ORIGINAL_SHA = git rev-parse HEAD

          & "$env:WORKFLOWS_DIR/dottest-ai-agent-run.ps1"

          $CURRENT_SHA = git rev-parse HEAD
          if ($CURRENT_SHA -ne $ORIGINAL_SHA) {
            $ORIGINAL_BRANCH = "${{ github.event.pull_request.head.ref }}"

            git push origin "$env:FIXES_BRANCH_NAME"

            $BRANCH_URL = "${{ github.server_url }}/${{ github.repository }}/tree/$env:FIXES_BRANCH_NAME"
            $cmd_pr_create = "gh pr create --head `"$env:FIXES_BRANCH_NAME`" --base `"$ORIGINAL_BRANCH`" --title `"dottest-ai-agent: $env:FIXES_BRANCH_NAME`" --body `"Automated dotTEST AI Agent changes`""
            Write-Output $cmd_pr_create
            Invoke-Expression $cmd_pr_create

            $PR_URL = "${{ github.server_url }}/${{ github.repository }}/pull"
            Start-Sleep -Seconds 2

            $cmd_pr_number = "gh pr list --head `"$env:FIXES_BRANCH_NAME`" --base `"$ORIGINAL_BRANCH`" --state open --limit 1 | Select-Object -First 1 | ForEach-Object { (`$_ -split '\s+')[0] }"
            Write-Output $cmd_pr_number
            $PR_NUMBER = Invoke-Expression $cmd_pr_number

            $cmd_pr_comment = "gh pr comment ${{ github.event.pull_request.number }} --body `"dotTEST AI Agent branch: $BRANCH_URL | Pull request: $PR_URL/$PR_NUMBER`""
            Write-Output $cmd_pr_comment
            Invoke-Expression $cmd_pr_comment
          }
